name: Windows

on:
  push:
    branches: [ master ]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          update: true
          path-type: minimal
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-flac
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-libjpeg
            mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-openal

      - name: Install dependencies
        shell: msys2 {0}
        run: pacman -S --needed --noconfirm mingw-w64-x86_64-gtest

      - name: Install SFML 2.6.1
        shell: msys2 {0}
        run: |
          sfml_package="/tmp/mingw-w64-x86_64-sfml-2.6.1-1-any.pkg.tar.zst"
          urls=(
            "https://mirror.msys2.org/mingw/mingw64/mingw-w64-x86_64-sfml-2.6.1-1-any.pkg.tar.zst"
            "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-sfml-2.6.1-1-any.pkg.tar.zst"
          )
          downloaded=0
          for url in "${urls[@]}"; do
            if curl -fL --retry 5 --retry-delay 2 --retry-all-errors "$url" -o "$sfml_package"; then
              downloaded=1
              break
            fi
          done
          if [ "$downloaded" -ne 1 ]; then
            echo "Failed to download SFML 2.6.1 package from MSYS2 mirrors." >&2
            exit 1
          fi
          pacman -U --noconfirm --needed "$sfml_package"

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja

      - name: Build Project
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Run tests
        shell: msys2 {0}
        env:
          RINVID_SKIP_OPENGL_TESTS: 1
        run: ctest --test-dir build --output-on-failure -V
